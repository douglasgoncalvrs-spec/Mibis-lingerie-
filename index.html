<button onclick="enviar()">Enviar Pedido</button>

<script>

function enviar(){

let representante=document.getElementById("representante").value
let revendedora=document.getElementById("revendedora").value
let cidade=document.getElementById("cidade").value
let codigo=document.getElementById("codigo").value
let retorno=document.getElementById("retorno").value
let obs=document.getElementById("obs").value

let marcados=document.querySelectorAll("input[type=checkbox]:checked")

let lista=""

marcados.forEach(function(item){
lista+=item.value+"\n"
})

let msg=
"Pedido Mibis Lingerie\n\n"+
"Representante: "+representante+"\n"+
"Revendedora: "+revendedora+"\n"+
"Cidade: "+cidade+"\n"+
"Código: "+codigo+"\n"+
"Acerto Previsto: "+retorno+"\n"+
"Observação: "+obs+"\n\n"+
lista

let url="https://wa.me/5551981517420?text="+encodeURIComponent(msg)

window.open(url,"_blank")

}
