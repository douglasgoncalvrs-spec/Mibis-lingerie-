<button onclick="enviar()">Enviar Pedido</button>

<script>

function enviar(){

let nome = document.getElementById("nome").value
let cidade = document.getElementById("cidade").value

let itens = document.querySelectorAll("input[type=checkbox]:checked")

let lista = ""

itens.forEach(function(item){
lista += item.value + "%0A"
})

let mensagem =
"Pedido Mibis%0A%0A"+
"Revendedora: "+nome+"%0A"+
"Cidade: "+cidade+"%0A%0A"+
lista

let telefone="5551SEUNUMERO"

window.open("https://wa.me/"+telefone+"?text="+mensagem)

}

</script>
