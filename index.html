<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Perfil Revendedora - Mibis</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f4f4f4;
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

td{
padding:8px;
border-bottom:1px solid #ccc;
text-align:center;
}

.produto{
text-align:left;
font-weight:bold;
}

input{
padding:8px;
width:100%;
margin-bottom:10px;
}

button{
margin-top:20px;
width:100%;
padding:15px;
font-size:18px;
background:black;
color:white;
border:none;
border-radius:8px;
}

</style>

</head>

<body>

<h2>PERFIL REVENDEDORA</h2>

<label>Representante</label>
<input id="representante">

<label>Vendedora</label>
<input id="vendedora">

<label>Cidade</label>
<input id="cidade">

<br>

<table>

<tr>
<th>Produto</th>
<th>P</th>
<th>M</th>
<th>G</th>
<th>GG</th>
</tr>

<tr>
<td class="produto">Tangas Variadas</td>
<td><input type="checkbox" value="Tangas P"></td>
<td><input type="checkbox" value="Tangas M"></td>
<td><input type="checkbox" value="Tangas G"></td>
<td><input type="checkbox" value="Tangas GG"></td>
</tr>

<tr>
<td class="produto">Cueca Feminina</td>
<td><input type="checkbox" value="Cueca Feminina P"></td>
<td><input type="checkbox" value="Cueca Feminina M"></td>
<td><input type="checkbox" value="Cueca Feminina G"></td>
<td><input type="checkbox" value="Cueca Feminina GG"></td>
</tr>

<tr>
<td class="produto">Fio Dental</td>
<td><input type="checkbox" value="Fio Dental P"></td>
<td><input type="checkbox" value="Fio Dental M"></td>
<td><input type="checkbox" value="Fio Dental G"></td>
<td><input type="checkbox" value="Fio Dental GG"></td>
</tr>

<tr>
<td class="produto">Tangão</td>
<td><input type="checkbox" value="Tangão P"></td>
<td><input type="checkbox" value="Tangão M"></td>
<td><input type="checkbox" value="Tangão G"></td>
<td><input type="checkbox" value="Tangão GG"></td>
</tr>

<tr>
<td class="produto">Calçola</td>
<td><input type="checkbox" value="Calçola P"></td>
<td><input type="checkbox" value="Calçola M"></td>
<td><input type="checkbox" value="Calçola G"></td>
<td><input type="checkbox" value="Calçola GG"></td>
</tr>

<tr>
<td class="produto">Sutiã com Bojo</td>
<td><input type="checkbox" value="Sutiã com Bojo P"></td>
<td><input type="checkbox" value="Sutiã com Bojo M"></td>
<td><input type="checkbox" value="Sutiã com Bojo G"></td>
<td><input type="checkbox" value="Sutiã com Bojo GG"></td>
</tr>

<tr>
<td class="produto">Sutiã sem Bojo</td>
<td><input type="checkbox" value="Sutiã sem Bojo P"></td>
<td><input type="checkbox" value="Sutiã sem Bojo M"></td>
<td><input type="checkbox" value="Sutiã sem Bojo G"></td>
<td><input type="checkbox" value="Sutiã sem Bojo GG"></td>
</tr>

<tr>
<td class="produto">Conjuntos</td>
<td><input type="checkbox" value="Conjuntos P"></td>
<td><input type="checkbox" value="Conjuntos M"></td>
<td><input type="checkbox" value="Conjuntos G"></td>
<td><input type="checkbox" value="Conjuntos GG"></td>
</tr>

<tr>
<td class="produto">Short Doll Adulto</td>
<td><input type="checkbox" value="Short Doll Adulto P"></td>
<td><input type="checkbox" value="Short Doll Adulto M"></td>
<td><input type="checkbox" value="Short Doll Adulto G"></td>
<td><input type="checkbox" value="Short Doll Adulto GG"></td>
</tr>

<tr>
<td class="produto">Short Doll Infantil</td>
<td><input type="checkbox" value="Short Doll Infantil P"></td>
<td><input type="checkbox" value="Short Doll Infantil M"></td>
<td><input type="checkbox" value="Short Doll Infantil G"></td>
<td><input type="checkbox" value="Short Doll Infantil GG"></td>
</tr>

</table>

<label>Observação</label>
<input id="obs">

<button onclick="enviar()">Enviar Pedido</button>

<script>

function enviar(){

let representante=document.getElementById("representante").value
let vendedora=document.getElementById("vendedora").value
let cidade=document.getElementById("cidade").value
let obs=document.getElementById("obs").value

let marcados=document.querySelectorAll("input[type=checkbox]:checked")

let lista=""

marcados.forEach(function(item){
lista+=item.value+"%0A"
})

let msg="Pedido Mibis%0A%0A"+
"Representante: "+representante+"%0A"+
"Revendedora: "+vendedora+"%0A"+
"Cidade: "+cidade+"%0A%0A"+
lista+
"%0AObs: "+obs

let telefone="5551981517420

window.open("https://wa.me/"+telefone+"?text="+msg)

}

</script>

</body>
</html>
