<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mibis Lingerie - Pedido</title>

<style>

body{
font-family:Arial;
background:#ffe6f0;
padding:20px;
}

h2{
color:#cc0066;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#25D366;
color:white;
border:none;
padding:15px;
width:100%;
font-size:18px;
border-radius:8px;
}

.produto{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

</style>

</head>

<body>

<h2>Mibis Lingerie</h2>

<label>Representante</label>
<input id="representante">

<label>Revendedora</label>
<input id="revendedora">

<label>Cidade</label>
<input id="cidade">

<label>Código</label>
<input id="codigo">

<label>Acerto Previsto</label>
<input id="retorno">

<label>Observação</label>
<input id="obs">

<h3>Produtos</h3>

<div id="produtos"></div>

<button onclick="enviar()">Enviar Pedido</button>

<script>

let variedades=[
"Tanga Variada",
"Conjunto Renda",
"Calcinha Algodão",
"Conjunto Microfibra",
"Sutiã Reforçado",
"Baby Doll",
"Short Doll",
"Camisola",
"Conjunto Sensual",
"Calcinha Fio"
]

function criarProdutos(){

let container=document.getElementById("produtos")

for(let i=0;i<variedades.length;i++){

let div=document.createElement("div")
div.className="produto"

div.innerHTML=`

<b>${variedades[i]}</b>

<label>Tamanho</label>
<select id="tam${i}">
<option></option>
<option>P</option>
<option>M</option>
<option>G</option>
<option>GG</option>
</select>

<label>Quantidade</label>
<input type="number" id="qtd${i}">

`

container.appendChild(div)

}

}

criarProdutos()

function enviar(){

let representante=document.getElementById("representante").value
let revendedora=document.getElementById("revendedora").value
let cidade=document.getElementById("cidade").value
let codigo=document.getElementById("codigo").value
let retorno=document.getElementById("retorno").value
let obs=document.getElementById("obs").value

let texto="Pedido Mibis Lingerie\n\n"

texto+="Representante: "+representante+"\n"
texto+="Revendedora: "+revendedora+"\n"
texto+="Cidade: "+cidade+"\n"
texto+="Código: "+codigo+"\n\n"

texto+="Acerto Previsto: "+retorno+"\n"
texto+="Observação: "+obs+"\n\n"

for(let i=0;i<variedades.length;i++){

let tam=document.getElementById("tam"+i).value
let qtd=document.getElementById("qtd"+i).value

if(qtd>0){

texto+=variedades[i]+" - "+tam+" - "+qtd+"\n"

}

}

let numero="5551981517420"

let url="https://wa.me/"+numero+"?text="+encodeURIComponent(texto)

window.open(url)

}

</script>

</body>
</html>
