<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pedidos Mibis Lingerie</title>

<style>

body{
font-family:Arial;
background:#fff0f6;
padding:20px;
}

h2{
color:#c2185b;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#25D366;
color:white;
border:none;
padding:15px;
width:100%;
font-size:18px;
border-radius:8px;
margin-top:20px;
}

.produto{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.total{
font-size:18px;
font-weight:bold;
margin-top:15px;
}

</style>

</head>

<body>

<h2>Mibis Lingerie - Pedido</h2>

<label>Representante</label>
<input id="representante">

<label>Revendedora</label>
<input id="revendedora">

<label>Cidade</label>
<input id="cidade">

<label>Código</label>
<input id="codigo">

<label>Acerto Previsto</label>
<input id="retorno">

<label>Observação</label>
<input id="obs">

<h3>Produtos</h3>

<div id="produtos"></div>

<div class="total">
Total de peças: <span id="total">0</span>
</div>

<button onclick="enviar()">Enviar Pedido</button>

<script>

let variedades=[
"Tanga Variada",
"Conjunto Renda",
"Calcinha Algodão",
"Conjunto Microfibra",
"Sutiã Reforçado",
"Baby Doll",
"Short Doll",
"Camisola",
"Conjunto Sensual",
"Calcinha Fio"
]

// você pode colocar até 300 produtos aqui

function criarProdutos(){

let container=document.getElementById("produtos")

for(let i=0;i<variedades.length;i++){

let div=document.createElement("div")
div.className="produto"

div.innerHTML=`

<b>${variedades[i]}</b>

<label>Tamanho</label>
<select id="tam${i}">
<option></option>
<option>P</option>
<option>M</option>
<option>G</option>
<option>GG</option>
</select>

<label>Quantidade</label>
<input type="number" min="0" id="qtd${i}" oninput="somar()">

`

container.appendChild(div)

}

}

criarProdutos()

function somar(){

let total=0

for(let i=0;i<variedades.length;i++){

let qtd=document.getElementById("qtd"+i)

if(qtd && qtd.value){

total+=parseInt(qtd.value)

}

}

document.getElementById("total").innerText=total

}

function enviar(){

let representante=document.getElementById("representante").value
let revendedora=document.getElementById("revendedora").value
let cidade=document.getElementById("cidade").value
let codigo=document.getElementById("codigo").value
let retorno=document.getElementById("retorno").value
let obs=document.getElementById("obs").value

let texto="PEDIDO MIBIS LINGERIE\n\n"

texto+="Representante: "+representante+"\n"
texto+="Revendedora: "+revendedora+"\n"
texto+="Cidade: "+cidade+"\n"
texto+="Código: "+codigo+"\n\n"

texto+="Acerto Previsto: "+retorno+"\n"
texto+="Observação: "+obs+"\n\n"

texto+="Produtos:\n"

for(let i=0;i<variedades.length;i++){

let tam=document.getElementById("tam"+i).value
let qtd=document.getElementById("qtd"+i).value

if(qtd>0){

texto+=variedades[i]+" - "+tam+" - "+qtd+" peças\n"

}

}

let numero="5551981517420"

let url="https://wa.me/"+numero+"?text="+encodeURIComponent(texto)

window.open(url)

}

</script>

</body>
</html>
