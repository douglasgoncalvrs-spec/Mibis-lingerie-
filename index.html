<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mibis Lingerie - Pedido Revendedora</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:15px;}
h2{text-align:center;}
.box{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}
input{width:100%;padding:8px;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;background:white;}
td,th{padding:6px;border-bottom:1px solid #ddd;text-align:center;}
.prod{font-weight:bold;text-align:left;}
button{width:100%;padding:15px;background:black;color:white;font-size:18px;border:none;border-radius:8px;margin-top:15px;}
</style>

</head>

<body>

<h2>Mibis Lingerie</h2>

<button onclick="enviar()">Enviar Pedido</button>

<script>

function enviar(){

let representante=document.getElementById("representante").value
let revendedora=document.getElementById("revendedora").value
let cidade=document.getElementById("cidade").value
let codigo=document.getElementById("codigo").value
let retorno=document.getElementById("retorno").value

let marcados=document.querySelectorAll("input[type=checkbox]:checked")

let lista=""

marcados.forEach(function(item){
lista+=item.value+"%0A"
})

let msg=
"Pedido Mibis Lingerie%0A%0A"+
"Representante: "+representante+"%0A"+
"Revendedora: "+revendedora+"%0A"+
"Cidade: "+cidade+"%0A"+
"Código: "+codigo+"%0A"+
"Retorno: "+retorno+"%0A%0A"+
lista

let telefone="5551981517420"

window.open("https://wa.me/"+telefone+"?text="+msg)

}

</script>
