<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mibis Lingerie - Pedido</title>

<style>

body{
font-family:Arial;
background:#ffe6f0;
padding:20px;
}

h2{
color:#cc0066;
}

label{
font-weight:bold;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#25D366;
color:white;
border:none;
padding:15px;
width:100%;
font-size:18px;
border-radius:8px;
margin-top:20px;
}

.produto{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

.tamanhos label{
margin-right:10px;
}

</style>

</head>

<body>

<h2>Mibis Lingerie</h2>

<label>Representante</label>
<input id="representante">

<label>Revendedora</label>
<input id="revendedora">

<label>Cidade</label>
<input id="cidade">

<label>Código</label>
<input id="codigo">

<label>Acerto Previsto</label>
<input id="retorno">

<label>Observação</label>
<input id="obs">

<h3>Produtos</h3>

<div id="produtos"></div>

<button onclick="enviar()">Enviar Pedido</button>

<script>

let variedades=[
"Tanga Variada",
"Conjunto Renda",
"Calcinha Algodão",
"Conjunto Microfibra",
"Sutiã Reforçado",
"Baby Doll",
"Short Doll",
"Camisola",
"Conjunto Sensual",
"Calcinha Fio"
]

function criarProdutos(){

let container=document.getElementById("produtos")

for(let i=0;i<variedades.length;i++){

let div=document.createElement("div")
div.className="produto"

div.innerHTML=`

<b>${variedades[i]}</b>

<div class="tamanhos">

<label><input type="checkbox" value="${variedades[i]} P"> P</label>
<label><input type="checkbox" value="${variedades[i]} M"> M</label>
<label><input type="checkbox" value="${variedades[i]} G"> G</label>
<label><input type="checkbox" value="${variedades[i]} GG"> GG</label>

</div>

`

container.appendChild(div)

}

}

criarProdutos()

function enviar(){

let representante=document.getElementById("representante").value
let revendedora=document.getElementById("revendedora").value
let cidade=document.getElementById("cidade").value
let codigo=document.getElementById("codigo").value
let retorno=document.getElementById("retorno").value
let obs=document.getElementById("obs").value

let marcados=document.querySelectorAll("input[type=checkbox]:checked")

let lista=""

marcados.forEach(function(item){

lista+=item.value+"\n"

})

let msg=

"Pedido Mibis Lingerie\n\n"+

"Representante: "+representante+"\n"+
"Revendedora: "+revendedora+"\n"+
"Cidade: "+cidade+"\n"+
"Código: "+codigo+"\n\n"+

"Acerto Previsto: "+retorno+"\n"+
"Observação: "+obs+"\n\n"+

"Produtos:\n"+lista

let url="https://wa.me/5551981517420?text="+encodeURIComponent(msg)

window.open(url)

}

</script>

</body>
</html>
